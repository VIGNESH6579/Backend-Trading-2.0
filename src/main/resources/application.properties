server.port=${PORT:8080}
spring.application.name=oc-sentinel-v2

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Anthropic Claude API Key (set via env variable ANTHROPIC_API_KEY)
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Large payloads for option chain data
spring.websocket.max-text-message-size=1048576
spring.websocket.max-binary-message-size=1048576

# Logging
logging.level.com.ocsentinel=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.okhttp3=WARN
